<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Brand</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; color: #333; }
        header { background: #fff; padding: 20px; position: -webkit-sticky; position: sticky; top: 0; }
        nav { display: flex; justify-content: space-between; }
        nav a { text-decoration: none; padding: 10px; color: #333; }
        .hero { position: relative; height: 400px; overflow: hidden; }
        .hero video { width: 100%; height: 100%; object-fit: cover; }
        .best-sellers, .our-picks, .store-location, footer { padding: 20px; text-align: center; }
        .product-card { border: 1px solid #ddd; border-radius: 10px; margin: 10px; padding: 15px; display: inline-block; }
        footer { background: #f8f8f8; padding: 10px; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div>Brand Name</div>
            <div><a href="#">Home</a><a href="#">About</a><a href="#">Shop</a><a href="#">Contact</a></div>
        </nav>
    </header>
    <section class="hero">
        <video autoplay muted loop>
            <source src="hero-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>
    <section class="best-sellers">
        <h2>Best Sellers</h2>
        <div class="product-categories">
            <div class="product-card">Category 1</div>
            <div class="product-card">Category 2</div>
            <div class="product-card">Category 3</div>
        </div>
    </section>
    <section class="our-picks">
        <h2>Our Picks</h2>
        <div class="product-cards">
            <div class="product-card">Product 1</div>
            <div class="product-card">Product 2</div>
            <div class="product-card">Product 3</div>
        </div>
    </section>
    <section class="store-location">
        <h2>Our Store Location</h2>
        <p>123 Fashion St, Trendy City, Country</p>
    </section>
    <footer>
        <p>&copy; 2026 Fashion Brand. All rights reserved.</p>
    </footer>
</body>
</html>
